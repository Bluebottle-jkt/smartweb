# ── Relationship types ────────────────────────────────────────────────────────
relationship_types:
  OWNERSHIP:         "Kepemilikan saham"
  CONTROL:           "Pengendalian"
  FAMILY:            "Hubungan keluarga"
  AFFILIATION_OTHER: "Afiliasi lainnya"

# ── Entity types ──────────────────────────────────────────────────────────────
entity_types:
  PT:              "Perseroan Terbatas"
  CV:              "Commanditaire Vennootschap"
  UD:              "Usaha Dagang"
  Firma:           "Firma"
  Orang_Pribadi:   "Wajib Pajak Orang Pribadi"
  Koperasi:        "Koperasi"
  Yayasan:         "Yayasan"
  BUT:             "Bentuk Usaha Tetap"

# ── Graph performance guardrails ──────────────────────────────────────────────
graph:
  max_depth:     5
  max_nodes:     500
  max_edges:     1500
  default_depth: 2
  default_max_nodes: 300

# ── Rate limiting ─────────────────────────────────────────────────────────────
rate_limits:
  default_per_minute: 50
  graph_search_per_minute: 20
  detector_per_minute: 10
