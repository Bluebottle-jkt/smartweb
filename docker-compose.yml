version: '3.8'

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: smartweb-neo4j
    environment:
      NEO4J_AUTH: neo4j/smartweb_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: smartweb-postgres
    environment:
      POSTGRES_USER: smartweb
      POSTGRES_PASSWORD: smartweb_dev_pass
      POSTGRES_DB: smartweb_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartweb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartweb-backend
    environment:
      DATABASE_URL: postgresql://smartweb:smartweb_dev_pass@postgres:5432/smartweb_db
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALLOW_DB_RESET: "true"
      ALLOW_DERIVE: "true"
      AUTO_SEED: "true"
      SEED_GROUPS: "100"
      SEED_TAXPAYERS: "1500"
      SEED_BOS: "300"
      SEED_RNG: "20260109"
      LOG_LEVEL: INFO
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgresql://smartweb:smartweb_dev_pass@postgres:5432/smartweb_db
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALLOW_DB_RESET: "true"
      ALLOW_DERIVE: "true"
      AUTO_SEED: "true"
      SEED_GROUPS: "100"
      SEED_TAXPAYERS: "1500"
      SEED_BOS: "300"
      SEED_RNG: "20260109"
      LOG_LEVEL: INFO
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smartweb_neo4j_pass
      NEO4J_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartweb-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
    ports:
      - "3100:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
